<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix & Build — Абразивные диски и расходные материалы</title>
  <meta name="description" content="Fix & Build — отрезные диски, лепестковые круги, сверла, биты и другие расходные материалы для профессионалов и опта." />
  <style>
    :root {
      --bg: #0b1220;
      --bg-soft: #121b2e;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --text: #eef4ff;
      --muted: #b7c3d9;
      --accent: #ff8a00;
      --accent-2: #ffd166;
      --success: #1ec98f;
      --shadow: 0 18px 50px rgba(0,0,0,0.28);
      --radius: 22px;
      --container: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,138,0,0.22), transparent 22%),
        radial-gradient(circle at left bottom, rgba(255,209,102,0.12), transparent 18%),
        linear-gradient(180deg, #08101c 0%, #0d1728 100%);
      color: var(--text);
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--container), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: rgba(7, 12, 22, 0.78);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
